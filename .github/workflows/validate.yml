name: Validate

on:
  push:
  pull_request:

jobs:
  data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate cheat sheet data
        run: node scripts/validate-data.js
